<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拡張シンプル電卓</title>
<style>
  body { font-family: sans-serif; text-align: center; margin-top: 50px; background: #f0f0f0; }
  #display { width: 220px; height: 50px; font-size: 28px; text-align: right; margin-bottom: 10px; padding: 5px; border-radius: 5px; border: 1px solid #ccc; }
  .btn { width: 50px; height: 50px; font-size: 20px; margin: 3px; cursor: pointer; border-radius: 5px; border: none; background: #fff; transition: 0.2s; }
  .btn:hover { background: #d4d4d4; }
  #history { margin-top: 20px; max-width: 220px; margin-left: auto; margin-right: auto; text-align: left; }
  #history div { font-size: 14px; border-bottom: 1px solid #ccc; padding: 2px; }
</style>
</head>
<body>

<h2>拡張電卓</h2>
<input type="text" id="display" readonly>
<div>
  <button class="btn" onclick="press('7')">7</button>
  <button class="btn" onclick="press('8')">8</button>
  <button class="btn" onclick="press('9')">9</button>
  <button class="btn" onclick="press('/')">÷</button>
</div>
<div>
  <button class="btn" onclick="press('4')">4</button>
  <button class="btn" onclick="press('5')">5</button>
  <button class="btn" onclick="press('6')">6</button>
  <button class="btn" onclick="press('*')">×</button>
</div>
<div>
  <button class="btn" onclick="press('1')">1</button>
  <button class="btn" onclick="press('2')">2</button>
  <button class="btn" onclick="press('3')">3</button>
  <button class="btn" onclick="press('-')">−</button>
</div>
<div>
  <button class="btn" onclick="press('0')">0</button>
  <button class="btn" onclick="press('.')">.</button>
  <button class="btn" onclick="calculate()">=</button>
  <button class="btn" onclick="press('+')">+</button>
</div>
<div>
  <button class="btn" onclick="clearDisplay()">C</button>
</div>

<div id="history"></div>

<script>
let expression = '';

function press(value) {
  expression += value;
  document.getElementById('display').value = expression;
}

function calculate() {
  try {
    const result = eval(expression);
    addHistory(expression + " = " + result);
    expression = result.toString();
    document.getElementById('display').value = expression;
  } catch (e) {
    document.getElementById('display').value = 'Error';
    expression = '';
  }
}

function clearDisplay() {
  expression = '';
  document.getElementById('display').value = '';
}

function addHistory(text) {
  const history = document.getElementById('history');
  const div = document.createElement('div');
  div.textContent = text;
  history.prepend(div);
}

// キーボード対応
document.addEventListener('keydown', (e) => {
  if ((e.key >= '0' && e.key <= '9') || e.key === '.' || ['+', '-', '*', '/'].includes(e.key)) {
    press(e.key);
  } else if (e.key === 'Enter') {
    calculate();
  } else if (e.key === 'Backspace') {
    expression = expression.slice(0, -1);
    document.getElementById('display').value = expression;
  } else if (e.key.toLowerCase() === 'c') {
    clearDisplay();
  }
});
</script>

</body>
</html>
